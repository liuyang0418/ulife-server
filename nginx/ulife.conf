# nginx/ulife.conf — Nginx 反向代理配置
# 放置路径（服务器上）: /etc/nginx/sites-available/ulife

# ─── 上游：PM2 集群（cluster 模式只需指向一个端口）─────────
upstream ulife_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ─── HTTP → HTTPS 强制跳转 ───────────────────────────────────
server {
    listen 80;
    server_name 你的域名.com www.你的域名.com;

    # Let's Encrypt 续签验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS 主配置 ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name 你的域名.com www.你的域名.com;

    # SSL 证书（certbot 自动申请后路径如下）
    ssl_certificate     /etc/letsencrypt/live/你的域名.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/你的域名.com/privkey.pem;

    # SSL 加固
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ─── 安全响应头 ───────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ─── 请求体限制（视频打卡通过 OSS 直传，API 不需要大）───
    client_max_body_size 10m;

    # ─── API 代理 ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://ulife_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # 不缓存 API 响应
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─── 健康检查（不鉴权、不缓存）──────────────────────────
    location /health {
        proxy_pass http://ulife_backend;
        access_log off;
    }

    # ─── 前端静态文件（如果前后端同域部署）─────────────────
    # location / {
    #     root /opt/ulife-h5/dist;
    #     index index.html;
    #     try_files $uri $uri/ /index.html;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ─── 日志 ──────────────────────────────────────────────
    access_log /var/log/nginx/ulife_access.log;
    error_log  /var/log/nginx/ulife_error.log;
}
